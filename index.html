<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Here Capture - 웹페이지 전체 캡처</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/YOUR_KIT_ID.js" crossorigin="anonymous"></script> <!-- Font Awesome 킷 ID를 여기에 추가하세요 -->
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-camera-retro"></i> Here Capture</h1>
            <p class="subtitle">웹페이지 전체를 빠르고 간편하게 캡처하세요</p>
        </header>

        <div class="capture-form">
            <input type="text" id="urlInput" placeholder="캡처할 웹페이지 URL을 입력하세요 (예: https://www.google.com)">
            <button id="captureBtn">캡처하기</button>
        </div>

        <div id="result" class="result-container"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
